# ============================================
# Theme Song Entrance System — Configuration
# ============================================

# --- Camera ---
camera:
  rtsp_url: "rtsp://127.0.0.1:8554/raw"  # RTSP stream (if using Vision SoM eyemodule)
  device_index: 0           # USB webcam /dev/video index
  frame_width: 640
  frame_height: 480
  test_image: null           # Optional: path to a static image for testing without camera

# --- Face Detection ---
detection:
  model: "models/face-detection-retail-0005.xml"
  device: "CPU"             # CPU or MYRIAD (if VPU available)
  confidence_threshold: 0.7 # Minimum confidence to consider a detection

# --- Face Recognition ---
recognition:
  model: "models/face-reidentification-retail-0095.xml"
  device: "CPU"
  threshold: 0.35           # Cosine similarity threshold (lower = stricter)
  embeddings_dir: "data/faces"

# --- Song Playback ---
playback:
  songs_dir: "songs"
  volume: 0.8               # 0.0 to 1.0
  cooldown_seconds: 300     # Don't replay same person's song within this window
  max_duration: 30          # Max seconds to play per song (null = full song)
  stranger_song: null       # Path to song for unrecognized faces (null = disabled)
  bt_keepalive_interval: 300  # Seconds between silent pings to keep BT speaker awake (0 = disabled)

# --- General ---
general:
  log_level: "INFO"         # DEBUG, INFO, WARNING, ERROR
  display_preview: false    # Set true if you have a monitor connected
  detection_interval: 0.5   # Seconds between detection cycles (saves CPU)
